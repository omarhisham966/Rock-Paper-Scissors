<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let humanScore = 0
        let computerScore = 0

        function getComputerChoice(){

            let choice = Math.floor(Math.random()*3)

            if(choice === 0){
                return "rock"
            }

            else if(choice === 1){
                return "paper"
            }
            
            else {return "scissors"}
        }

        function getHumanChoice(){
            let choice = prompt("Please Enter Your Choice: \n -ROCK\n -PAPER\n -SCISSORS")

            return choice.toLowerCase()
        }

        function playRound(humanChoice, computerChoice){

            if (humanChoice === computerChoice){
             alert(`Tie, The Score is ${humanScore} : ${computerScore}`)
             return
            }

            if(humanChoice === "rock" && computerChoice === "scissors" ||
                humanChoice === "paper" && computerChoice === "rock" || 
                humanChoice === "scissors" && computerChoice === "paper"){
                
                    humanScore++
                    alert(`You win! ${humanChoice} beats ${computerChoice}, The Score is ${humanScore} : ${computerScore}`)
            }

            else {
                computerScore++
                alert(`You Lose! ${computerChoice} beats ${humanChoice}, The Score is ${humanScore} : ${computerScore}`)
                        
            }
        }

        function playGame(){
            for(let i=0;i<5;i++){
        
                let humanSelection = getHumanChoice();
                let computerSelection = getComputerChoice();
                playRound(humanSelection, computerSelection)
        
            }
    
            if (humanScore > computerScore) {
                alert('You Are the Winner! ' + humanScore + " - " + computerScore)
            }

            else if (computerScore > humanScore){
                alert('Computer is the Winner! ' + humanScore + " - " + computerScore)
            }

            else {alert("IT IS A TIE " + humanScore + " - " + computerScore)}

        }

        playGame()

        let proceed = prompt("Do You Want To Play Again?\nYes\nNo")

        while(proceed.toLowerCase() !== "no"){
            humanScore = 0
            computerScore = 0
            playGame()
            proceed = prompt("Do You Want To Play Again?\nYes\nNo")
        }

        alert("Bye")

    </script>
</body>
</html>
