<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let humanScore = 0
        let computerScore = 0

        function getComputerChoice(){

            let choice = Math.floor(Math.random()*100)

            console.log(choice)

            if(choice < 33){
                return "rock"
            }

            else if(34 <= choice && choice < 67){
                return "paper"
            }
            
            else {return "scissors"}
        }

        function getHumanChoice(){
            let choice = prompt("Please Enter Your Choice: \n1.ROCK\n2.PAPER\n3.SCISSORS")

            return choice
        }

        function playRound(humanChoice, computerChoice){
            if (humanChoice.toLowerCase() === "ROCK".toLowerCase() && computerChoice === "rock"){
                alert('Tie')
            }

            else if(humanChoice.toLowerCase() === "ROCK".toLowerCase() && computerChoice === "paper"){
                alert('You lose! Paper beats Rock')
                computerScore = computerScore + 1
            }

            else if(humanChoice.toLowerCase() === "ROCK".toLowerCase() && computerChoice === "scissors"){
                alert("You win! Rock beats Scissors")
                humanScore = humanScore + 1
            }

            else if(humanChoice.toLowerCase() === "PAPER".toLowerCase() && computerChoice === "rock"){
                alert("You win! Paper beats Rock")
                humanScore = humanScore + 1
            }

            else if(humanChoice.toLowerCase() === "PAPER".toLowerCase() && computerChoice === "paper"){
                alert("Tie")
            }

            else if(humanChoice.toLowerCase() === "PAPER".toLowerCase() && computerChoice === "scissors"){
                alert("You lose! Scissors beats Paper")
                computerScore = computerScore + 1
            }

            else if(humanChoice.toLowerCase() === "SCISSORS".toLowerCase() && computerChoice === "rock"){
                alert("You lose! Rock beats Scissors")
                computerScore = computerScore + 1
            }

            else if(humanChoice.toLowerCase() === "SCISSORS".toLowerCase() && computerChoice === "paper"){
                alert("You win! Scissors beats Paper")
                humanScore = humanScore + 1
            }

            else if(humanChoice.toLowerCase() === "SCISSORS".toLowerCase() && computerChoice === "scissors"){
                alert("Tie")
            }
        }

        function playGame(){
            for(let i=0;i<5;i++){
                const humanSelection = getHumanChoice();
                const computerSelection = getComputerChoice();
                playRound(humanSelection, computerSelection)
            }
    
            if (humanScore > computerScore) {
                alert('You Are the Winner!')
            }

            else if (computerScore > humanScore){
                alert('Computer is the Winner!')
            }

            else {alert("IT IS A TIE")}

        }

        playGame()

        let proceed = prompt("Do You Want To Play Again?\n1.Yes\n2.No")

        while(proceed.toLowerCase() != "NO".toLowerCase()){
            playGame()
            proceed = prompt("Do You Want To Play Again?\n1.Yes\n2.No")
        }

    </script>
</body>
</html>
